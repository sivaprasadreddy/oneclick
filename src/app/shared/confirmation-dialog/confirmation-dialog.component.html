<div class="dialog-backdrop" (click)="cancelled.emit()">
  <div class="dialog" role="alertdialog" aria-modal="true" (click)="$event.stopPropagation()">
    <div class="dialog-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h3 class="dialog-title">{{ title() }}</h3>
    <p class="dialog-message">{{ message() }}</p>
    <div class="dialog-actions">
      <button class="btn-cancel" (click)="cancelled.emit()">{{ cancelLabel() }}</button>
      <button class="btn-confirm" (click)="confirmed.emit()">{{ confirmLabel() }}</button>
    </div>
  </div>
</div>
